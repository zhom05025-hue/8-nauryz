<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<title>8 Наурыз құттықтау</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff8fc4,#ffd6e7);
overflow:hidden;
}

.container{
text-align:center;
}

h1{
color:white;
font-size:38px;
margin-bottom:40px;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:12px;
cursor:pointer;
margin:10px;
}

#yes{
background:#ff3f9a;
color:white;
}

#no{
background:white;
transition:0.3s;
}

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-10vh);
}
}

.message{
color:white;
font-size:40px;
text-align:center;
padding:30px;
}

</style>
</head>

<body>

<div class="container" id="main">
<h1>🌷 8 Наурызбен құттықтаймын! 🌷<br>Сыйлық аласың ба?</h1>

<button id="yes">Иә</button>
<button id="no">Жоқ</button>
</div>

<script>

let yes=document.getElementById("yes")
let no=document.getElementById("no")

let size=22

yes.onclick=function(){

size+=10
no.style.fontSize=size+"px"

}

let wishes=[

"🌸 8 Наурыз құтты болсын! Әр күніңіз қуаныш пен бақытқа толы болсын!",
"💐 Сізге зор денсаулық, шексіз бақыт және көп күлкі тілейміз!",
"🌷 Көктемдей құлпырып, әрқашан жарқырап жүре беріңіз!",
"💖 Барлық армандарыңыз орындалып, өміріңіз гүлдей жайнасын!",
"🌹 Әр күніңіз махаббат пен шаттыққа толы болсын!",
"🌸 Әлемді әдемі ететін нәзік жандылар аман болсын!",
"💐 Көктеммен бірге бақыт, қуаныш және табыс келсін!"

]

no.onclick=function(){

let random=wishes[Math.floor(Math.random()*wishes.length)]

document.body.innerHTML="<div class='message'>"+random+"</div>"

}

function hearts(){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(Math.random()*20+10)+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(hearts,300)

</script>

</body>
</html>
